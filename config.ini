# Configuration file of biodb_disorder file
[DEFAULT]

# Download and compile from ftp://ftp.cmbi.ru.nl/pub/software/dssp/dssp-2.2.1.tgz
dssp=ext_bin/dssp-2.2.1/mkdssp

# https://zhanglab.ccmb.med.umich.edu/TM-score/TMscore.cpp
tm_score=ext_bin/TMscore

# Mobi parameters. See Martin AJM et al. (2010) Bioinformatics, 26(22):2916-2917. PMID 20861031
# and http://protein.bio.unipd.it/mobi2
mobi_d_0=4.0
mobi_d_mean=0.85
mobi_d_std=0.09
mobi_phi=20.0
mobi_psi=20.0

# High temperature disorder. Score = 0.5 when B-factor = wilson_b_factor. Score = 1.0 when the
# B-factor >= wilson_b_factor * 2.0
wilson_b_factor=1.2

